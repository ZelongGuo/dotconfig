;Sound
[module/sound]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>
format-volume-padding = 2
format-volume-underline = ${colors.menucol-sealine}

label-volume = %percentage%
label-volume-font = 3

label-muted = ’æ” (%percentage%)
label-muted-font = 3
label-muted-padding = 2
label-muted-foreground = ${colors.gray}
label-muted-underline = ${colors.gray}

ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©
ramp-volume-font = 7
ramp-volume-foreground = ${colors.menucol-sealine}


;Brightness
[module/brightness]
type = internal/xbacklight
format = <label>
format-padding = 2
format-prefix = ’Ś¤
format-underline = ${colors.menucol-yellow}
format-prefix-foreground = ${colors.menucol-yellow}

label = " %percentage%"
label-font = 3

[module/inputmethod]
type = custom/script
exec = ~/.config/polybar/input-method.sh
interval = 1
format-padding = 2
format-underline = ${colors.menucol-blue}
format-foreground = ${colors.menucol-blue}
label-font = 7

;Keyboard Layout
[module/layout]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = caps lock
blacklist-2 = scroll lock

format-prefix = "’ä£ "
format-underline = ${colors.menucol-blue}
format-foreground = ${colors.menucol-blue}
format-padding = 2

label-layout = %layout%
label-layout-font = 6
label-layout-foreground = ${colors.light}


;Custom Exit Button
[module/powermenu]
type = custom/text

format = ŌÅ╗
format-font = 7
format-padding = 2
format-foreground = ${colors.menucol-lightblue}
format-underline = ${colors.menucol-lightblue}
click-left = sh ~/.config/polybar/powermenu.sh


;Battery Indicator
[module/battery]
type = internal/battery
battery = BAT1
full-at = 100

format-charging = <animation-charging> <label-charging>
format-charging-padding = 2
format-charging-underline = ${colors.menucol-orange}

format-discharging = <animation-discharging> <label-discharging>
format-discharging-padding = 2
format-discharging-underline = ${colors.menucol-orange}

label-charging = %percentage%
label-charging-font = 3

label-discharging = %percentage%
label-discharging-font = 3

animation-charging-0 = ’¢ģ
animation-charging-1 = ’¢å
animation-charging-2 = ’¢ć
animation-charging-3 = ’¢ł
animation-charging-4 = ’¢ä
animation-charging-framerate = 750
animation-charging-foreground = ${colors.menucol-orange}

animation-discharging-0 = ’ĢĖ
animation-discharging-1 = ’¢ü
animation-discharging-2 = ’¢Ć
animation-discharging-3 = ’Ģ┐
animation-discharging-4 = ’ĢŠ
animation-discharging-5 = ’ĢĮ
animation-discharging-6 = ’Ģ╝
animation-discharging-7 = ’Ģ╗
animation-discharging-8 = ’Ģ║
animation-discharging-9 = ’Ģ╣
animation-discharging-framerate = 750
animation-discharging-foreground = ${colors.menucol-orange}


[module/cpu]
type = internal/cpu
interval = 1.0
