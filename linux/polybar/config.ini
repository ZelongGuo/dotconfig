[fonts]
opensansreg = JetBrainsMono Nerd Font:Regular:size=12
opensanssemibold = JetBrainsMono Nerd Font:Bold:size=12
opensansbold = JetBrainsMono Nerd Font:Bold:size=12
opensansboldhigh = JetBrainsMono Nerd Font:Bold:size=15
opensansital = JetBrainsMono Nerd Font:Italic:size=13
xos = JetBrainsMono Nerd Font:size=16;0
nerd = JetBrainsMono Nerd Font:size=14;0
ime = "Noto Sans CJK SC:size=14;2"

[colors]
light-red = #D95B5B
light-green = #249824
light-purple = #A44BA0

menucol-yellow = #F7F272
menucol-blue = #1771F1
menucol-orange = #FFAF60
menucol-red = #F85C50
menucol-green = #77BD8B
menucol-sealine = #00CF91
menucol-purple = #9A76B3
menucol-pink = #FF77BF
menucol-deepblue = #6560FF
menucol-lightblue = #60FFF7

fav-purple = #6633FF
dark = #111
dark-red = #311
dark-green = #131
dark-purple = #201134
light = #eee
gray = #999
dark-gray = #333


[bar/main]
# for dual monitor
monitor = ${env:MONITOR:}

enable-ipc = true
override-redirect = false

bottom = false
width = 100%
height = 28

background = ${colors.dark}
foreground = ${colors.light}

line-color = ${colors.light-purple}
line-size = 2

separator = "   "

;List of fonts
font-0 = ${fonts.opensansreg}
font-1 = ${fonts.opensanssemibold}
font-2 = ${fonts.opensansbold}
font-3 = ${fonts.opensansital}
font-4 = ${fonts.xos}
font-5 = ${fonts.nerd}
font-6 = ${fonts.opensansboldhigh}
font-7 = ${fonts.ime}

# wm-restack = i3
# tray-position = left

# modules-left = workspaces xkbstates xkillapp settings appfilemanager mediaplayer
modules-left = workspaces mediaplayer
modules-center = date
# modules-right = layout temperature memory memoryswap cpu battery brightness sound wifi eth powermenu
modules-right = inputmethod temperature cpu memory eth sound powermenu

;Date correction
[module/date]
type = internal/date

time = %H:%M
# date = %A, %B %d
date = %A, %Y-%m-%d
date-alt = %A, %B %d, %Y
time-alt = %H:%M:%S

format-prefix = "’ü│ "
format-padding = 2
format-underline = ${colors.menucol-orange}
format-foreground = ${colors.menucol-orange}
interval = 20

label = %date%, %time%
label-font = 2
label-foreground = ${colors.light}


;Workspaces
[module/workspaces]
type = internal/i3

pin-workspaces = true
strip-wsnumbers = true
index-sort = true

format = <label-state> <label-mode>

label-dimmed-underline = ${colors.background}

;On editing mode (resize for ex)
label-mode = %mode%
label-mode-background = ${colors.dark-purple}
label-mode-underline = ${colors.fav-purple}
label-mode-padding = 2
label-mode-font = 3

label-focused = %index%
label-focused-background = ${colors.dark-green}
label-focused-underline = ${colors.light-green}
label-focused-padding = 3
label-focused-font = 3

label-unfocused = %index%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 3
label-unfocused-font = 3

label-visible = %index%
label-visible-background = ${colors.dark-purple}
label-visible-underline = ${colors.light-purple}
label-visible-padding = 3
label-visible-font = 3

label-urgent = %index%
label-urgent-background = ${colors.dark-red}
label-urgent-underline = ${colors.light-red}
label-urgent-padding = 3
label-urgent-font = 3


;Media Player
[module/mediaplayer]
type = custom/script
format = <label>
format-padding = 2
exec = ~/.config/polybar/player.sh
exec-if = playerctl status
interval = 0.5
label-font = 3
click-middle = playerctl play-pause

format-underline = ${colors.menucol-blue}
format-foreground = ${colors.menucol-blue}


