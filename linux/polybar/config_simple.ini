[colors]
background = #CC1F2329
background-alt = #2b3137
foreground = #e6edf3
foreground-dim = #9aa4b2
primary = #88c0d0
secondary = #81a1c1
alert = #bf616a
good = #a3be8c
warning = #ebcb8b

[bar/main]
width = 100%
height = 28
radius = 0
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-size = 0
padding-left = 1
padding-right = 1

module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=11;2"
font-1 = "Noto Sans CJK SC:size=11;2"

modules-left = i3 xwindow
modules-center =
modules-right = cpu memory filesystem pulseaudio network date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 6

wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = #1f2329
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-dim}
label-unfocused-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = #ffffff
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = MEM %percentage_used%%

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
label-mounted = DISK %percentage_used%%
label-unmounted = DISK N/A
label-unmounted-foreground = ${colors.foreground-dim}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
# label-volume = VOL %percentage%%
label-volume =  %percentage%%
label-muted = VOL muted
label-muted-foreground = ${colors.foreground-dim}

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
# label-connected = NET %essid%
# label-disconnected = NET down
label-connected =  %essid%
label-disconnected = 󰖪 down
label-disconnected-foreground = ${colors.foreground-dim}

[module/date]
type = internal/date
interval = 5
date = %Y-%m-%d
time = %H:%M
# label = %date% %time%
label =  %date%  %time%

